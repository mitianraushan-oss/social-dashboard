<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>MapMyRun to Strava</title>
  <link rel="stylesheet" href="global.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  </style>
</head>
<body style="margin:0; padding:0; background:#FAFAFA;">

<div class="slide" style="display:flex; align-items:center; padding:64px 72px; gap:48px;">

  <!-- Left text block -->
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; min-width:0;">

    <!-- Brand tags -->
    <div style="display:flex; gap:10px; margin-bottom:32px;">
      <span class="tag tag-mapmyrun">MapMyRun</span>
      <span class="tag tag-strava">Strava</span>
    </div>

    <!-- Title -->
    <h1 style="font-family:'Inter',sans-serif; font-size:56px; font-weight:800; color:#1A1A2E; line-height:1.1; margin-bottom:20px; letter-spacing:-1.5px;">
      MapMyRun to Strava
    </h1>

    <!-- Subtitle -->
    <p style="font-family:'Inter',sans-serif; font-size:22px; font-weight:500; color:#6B7280; line-height:1.5; margin-bottom:40px; max-width:480px;">
      A Step-by-Step Guide to Transfer Your Workouts
    </p>

    <!-- URL box -->
    <div class="url-box" style="max-width:520px;">
      https://mapmyrun-to-strava.onrender.com/
    </div>
  </div>

  <!-- Right image -->
  <div style="flex:0 0 480px; display:flex; align-items:center; justify-content:center;">
    <div style="width:420px; height:500px; border-radius:20px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.12); border:1px solid #E5E7EB;">
      <img src="https://sfile.chatglm.cn/images-ppt/070f073c6e9c.jpg" alt="MapMyRun App Screenshot" style="width:100%; height:100%; object-fit:cover; display:block;">
    </div>
  </div>

</div>

</body>
</html>
